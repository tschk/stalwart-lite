name: Test

on:
  workflow_dispatch:

jobs:
  style:
    name: Check Style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Check Style
        run: cargo fmt --all --check

  test:
    name: Test
    needs: style
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: mysecretpassword
          POSTGRES_DB: stalwart
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stalwart"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: stalwart
        ports:
          - 3307:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -ppassword"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          curl -LO https://github.com/glauth/glauth/releases/download/v2.2.0/glauth-linux-amd64
          chmod a+rx glauth-linux-amd64
          nohup ./glauth-linux-amd64 -c tests/resources/ldap/ldap.cfg &
          curl -Lo minio.deb https://dl.min.io/server/minio/release/linux-amd64/archive/minio_20230629051228.0.0_amd64.deb
          sudo dpkg -i minio.deb
          mkdir ~/minio
          nohup minio server ~/minio --console-address :9091 &
          curl -LO https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod a+rx mc
          ./mc alias set myminio http://localhost:9000 minioadmin minioadmin
          ./mc mb tmp

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: JMAP Protocol Tests
        run: cargo test -p jmap_proto -- --nocapture

      - name: IMAP Protocol Tests
        run: cargo test -p imap_proto -- --nocapture

      - name: Full-text search Tests
        run: cargo test -p store -- --nocapture

      - name: Directory Tests
        run: cargo test -p tests directory -- --nocapture --test-threads=1

      - name: SMTP Tests
        run: cargo test -p tests smtp -- --nocapture

      - name: IMAP Tests
        run: cargo test -p tests imap -- --nocapture

      - name: JMAP Tests
        run: cargo test -p tests jmap -- --nocapture
